# Build NotchOz and produce a DMG.
# - Run manually: Actions → "Release DMG" → "Run workflow" → DMG appears as an artifact to download.
# - Push a tag (e.g. v1.0.0): same build + a GitHub Release is created with the DMG attached.
# No Apple signing on CI — the app may show "untrusted developer" until the user allows it.

name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild \
            -project NotchWidgets.xcodeproj \
            -scheme NotchOz \
            -configuration Release \
            -derivedDataPath build \
            clean build

      - name: Create DMG
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/NotchOz.app dist/
          hdiutil create -volname "NotchOz" -srcfolder dist -ov -format UDZO NotchOz.dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotchOz-dmg
          path: NotchOz.dmg

      - name: Create Release and upload DMG
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: NotchOz.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
