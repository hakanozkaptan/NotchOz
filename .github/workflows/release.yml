# Build NotchOz and produce a DMG.
# - Run manually: Actions → "Release DMG" → "Run workflow" → DMG appears as an artifact.
#   Optionally fill "Tag for release" (e.g. v1.0.0) to also attach the DMG to that release.
# - Push a tag (e.g. v1.0.0): same build + a GitHub Release is created with the DMG attached.
# No Apple signing on CI — the app may show "untrusted developer" until the user allows it.

name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for release (e.g. v1.0.0) — leave empty to only get artifact'
        required: false

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build Release
        run: |
          xcodebuild \
            -project NotchWidgets.xcodeproj \
            -scheme NotchOz \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create DMG
        run: |
          mkdir -p dist
          cp -R build/Build/Products/Release/NotchOz.app dist/
          hdiutil create -volname "NotchOz" -srcfolder dist -ov -format UDZO NotchOz.dmg

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NotchOz-dmg
          path: NotchOz.dmg

      - name: Create Release and upload DMG
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: NotchOz.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
